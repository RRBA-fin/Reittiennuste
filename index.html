<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reittiennuste</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0c0f;color:#e8e4dc;font-family:'Syne',sans-serif;min-height:100vh}
:root{--rail:#1a9e6e;--rail-dim:#0d5c40;--warn:#e8a020;--danger:#d44b2a;--safe:#1a9e6e;--bg:#0a0c0f;--bg2:#111418;--bg3:#181d22;--border:#252b32;--text:#e8e4dc;--muted:#6b7280;--mono:'DM Mono',monospace}
.app{max-width:920px;margin:0 auto;padding:32px 20px 80px}
.header{display:flex;align-items:flex-start;gap:20px;margin-bottom:36px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.rail-icon{width:52px;height:52px;background:var(--rail-dim);border:1.5px solid var(--rail);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:24px}
.header-text h1{font-size:28px;font-weight:800;letter-spacing:-0.5px;color:#fff;line-height:1.1}
.header-text p{font-size:13px;color:var(--muted);margin-top:6px;font-family:var(--mono)}
.track-line{height:2px;background:repeating-linear-gradient(90deg,var(--rail) 0,var(--rail) 18px,transparent 18px,transparent 28px);margin:0 -20px 32px;opacity:0.25}
.search-section{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:22px 26px;margin-bottom:20px}
.search-label{font-size:11px;font-family:var(--mono);color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px}
.search-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.select-wrap{flex:1;min-width:150px;position:relative}
.select-wrap select{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:'Syne',sans-serif;font-size:14px;padding:11px 36px 11px 14px;border-radius:10px;appearance:none;cursor:pointer;transition:border-color .15s}
.select-wrap select:focus{outline:none;border-color:var(--rail)}
.select-wrap::after{content:'▾';position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:11px}
.date-input{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:14px;padding:11px 14px;border-radius:10px;cursor:pointer;color-scheme:dark;flex-shrink:0}
.date-input:focus{outline:none;border-color:var(--rail)}
.arrow-mid{color:var(--muted);font-size:18px;padding:0 2px;flex-shrink:0}
.btn{background:var(--rail);color:#000;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;padding:11px 24px;border:none;border-radius:10px;cursor:pointer;transition:background .15s,transform .1s;white-space:nowrap;flex-shrink:0}
.btn:hover{background:#1db880}.btn:active{transform:scale(.98)}.btn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed}
.loading{display:flex;align-items:center;gap:12px;color:var(--muted);font-family:var(--mono);font-size:13px;padding:18px 0}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--rail);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:22px 26px;margin-bottom:18px}
.sec-title{font-size:11px;font-family:var(--mono);color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border)}
.train-list{display:flex;flex-direction:column;gap:7px}
.train-row{display:flex;align-items:center;gap:10px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:11px 14px;cursor:pointer;transition:border-color .15s;flex-wrap:wrap}
.train-row:hover{border-color:var(--rail)}.train-row.sel{border-color:var(--rail);background:#0c1e17}
.train-row.connection{background:#0a1a24;border-color:#1a3a4a;margin-left:24px;margin-top:-2px;border-radius:0 0 10px 10px;border-top:1px dashed #1a3a4a}
.train-row.connection:hover{border-color:#2a6a8a}
.train-row.connection.sel{border-color:#3a8aaa;background:#0a1e2a}
.conn-label{font-size:10px;font-family:var(--mono);color:#4a8aaa;letter-spacing:1px;text-transform:uppercase;width:100%;margin-bottom:2px}
.t-num{font-family:var(--mono);font-size:13px;font-weight:500;color:#fff;min-width:80px}
.t-badge{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:5px;background:var(--bg2);border:1px solid var(--border);color:var(--muted);white-space:nowrap}
.t-times{flex:1;font-family:var(--mono);font-size:13px;white-space:nowrap}
.t-stops{font-size:11px;color:var(--muted);font-family:var(--mono);white-space:nowrap}
.t-delay{font-family:var(--mono);font-size:12px;white-space:nowrap}
.t-delay.late{color:var(--danger)}.t-delay.ok{color:var(--safe)}.t-delay.unk{color:var(--muted)}
.hint{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:10px;text-align:center}
.prob-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:26px;margin-bottom:18px;position:relative;overflow:hidden}
.prob-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:4px 0 0 4px}
.prob-card.safe::before{background:var(--safe)}.prob-card.warn::before{background:var(--warn)}.prob-card.danger::before{background:var(--danger)}
.prob-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap;gap:12px}
.tid{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.troute{font-size:22px;font-weight:800;color:#fff;letter-spacing:-.3px}
.tmeta{font-size:12px;color:var(--muted);font-family:var(--mono);margin-top:4px}
.pval{text-align:right}
.pnum{font-size:54px;font-weight:800;font-family:var(--mono);line-height:1}
.pnum.safe{color:var(--safe)}.pnum.warn{color:var(--warn)}.pnum.danger{color:var(--danger)}
.plbl{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:2px}
.gauge-wrap{margin:12px 0 16px}
.gauge-track{height:6px;background:var(--bg3);border-radius:999px;overflow:hidden}
.gauge-fill{height:100%;border-radius:999px;transition:width .8s cubic-bezier(.34,1.56,.64,1)}
.gauge-fill.safe{background:linear-gradient(90deg,#0d5c40,var(--safe))}.gauge-fill.warn{background:linear-gradient(90deg,#7a5010,var(--warn))}.gauge-fill.danger{background:linear-gradient(90deg,#7a2010,var(--danger))}
.reasons{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}
.rtag{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:5px 11px;font-size:12px;font-family:var(--mono)}
.rdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.tile{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
.tlbl{font-size:10px;font-family:var(--mono);color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:6px}
.tval{font-size:20px;font-weight:700;color:#fff}
.tsub{font-size:11px;color:var(--muted);margin-top:2px;font-family:var(--mono)}
.wstrip{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:13px 17px;margin-bottom:16px;display:flex;align-items:center;gap:13px;flex-wrap:wrap}
.wicon{font-size:26px}.winfo{flex:1}
.wmain{font-size:14px;font-weight:600}
.wdet{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:2px}
.wimp{font-size:11px;font-family:var(--mono);padding:4px 10px;border-radius:6px;letter-spacing:.5px}
.wimp.low{background:#0d3d29;color:var(--safe);border:1px solid var(--rail-dim)}
.wimp.med{background:#3d2800;color:var(--warn);border:1px solid #5a3d00}
.wimp.high{background:#3d1000;color:var(--danger);border:1px solid #5a1800}
.tw-item{background:var(--bg3);border:1px solid #2a2200;border-left:3px solid var(--warn);border-radius:8px;padding:10px 13px;margin-bottom:7px}
.tw-title{font-weight:600;margin-bottom:3px;color:var(--warn);font-size:13px}
.tw-det{font-family:var(--mono);font-size:11px;color:var(--muted)}
.hist-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:22px 26px;margin-bottom:18px}
.stabs{display:flex;gap:4px;margin-bottom:16px;background:var(--bg3);border-radius:10px;padding:4px}
.stab{flex:1;padding:7px;text-align:center;font-size:12px;font-family:var(--mono);color:var(--muted);border:none;background:none;cursor:pointer;border-radius:7px;transition:all .15s}
.stab.active{background:var(--bg2);color:var(--text);border:1px solid var(--border)}
.dbars{display:flex;flex-direction:column;gap:10px}
.drow{display:flex;align-items:center;gap:12px}
.dlbl{font-family:var(--mono);font-size:12px;color:var(--muted);width:70px;flex-shrink:0}
.dbar-wrap{flex:1;height:6px;background:var(--bg3);border-radius:999px;overflow:hidden}
.dbar{height:100%;border-radius:999px;transition:width .6s ease}
.dpct{font-family:var(--mono);font-size:13px;font-weight:500;width:40px;text-align:right;flex-shrink:0}
.hnote{margin-top:13px;font-size:11px;color:var(--muted);font-family:var(--mono)}
.hlbl{font-size:12px;font-family:var(--mono);color:var(--muted);margin-bottom:10px}
.hlbl span{color:var(--rail)}
.dbadge{font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:4px;border:1px solid var(--border);color:var(--muted);flex-shrink:0}
.dbadge.live{border-color:var(--rail-dim);color:var(--rail)}
.dbadge.demo{border-color:#3d3000;color:var(--warn)}
.debug-box{background:#0d1117;border:1px solid #30363d;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-family:var(--mono);font-size:12px;color:#8b949e;display:flex;flex-direction:column;gap:4px}
.debug-box .derr{color:#f85149}
.footer{margin-top:40px;padding-top:18px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);font-family:var(--mono);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
@media(max-width:620px){.prob-header{flex-direction:column}.pnum{font-size:38px}.pval{text-align:left}.search-row{flex-direction:column}.select-wrap{min-width:100%}.date-input{width:100%}.btn{width:100%}.tiles{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

// Perustuu VR:n reittirakenteeseen
const DIRECT = {
  HKI: ["EPO","OUL","PSL","TKL","KE","JR","HYR","RI","HMN","TVR","TPE","LH","KV","LR","IMR","MKI","JNS","KUO","PHK","SEI","KAN","KKS","OL","ROI","TUR","KKK","SLO","SIM","LPI","SUO","VRP","NRM","LUS","OKK","JMS","TOL","LMI","LIM","YV","PKY","KOT","KAU"],

};

// Vaihtoasemat: mistä voi vaihtaa ja mihin
const TRANSFER_HUBS = {
  TPE: ["PKY","OKK","JMS","LMI"],
  KV:  ["KOT","LR","IMR"],
  LH:  ["KV","LR","IMR"],
  OL:  ["KAJ","ROI","LIM"],
  PHK: ["MKI","JNS","KUO","SMH","SUO","VRP","NRM"],
  SEI: ["KAU","KAN","KKS"],
  KUO: ["SIM","LPI","SUO","NRM"],
  JNS: ["NRM","SMH"],
  RI:  ["HMN","TVR"],
};

function getDestinations(dep) {
  const direct = DIRECT[dep] || [];
  // Vaihtokohteet – mistä asemasta vaihtaen
  const withTransfer = [];
  Object.entries(TRANSFER_HUBS).forEach(([hub, dests]) => {
    if (direct.includes(hub) || hub === dep) {
      dests.forEach(d => {
        if (!direct.includes(d) && d !== dep) {
          withTransfer.push({dest: d, via: hub});
        }
      });
    }
  });
  return {direct, withTransfer};
}

// ─── API ───────────────────────────────────────────────────────────────────────
// Oikea endpoint: live-trains (station-parametri), tai trains/{date} historiaan
async function apiTrains(dep, arr, date) {
  // Käytetään aina trains/{date} – tämä palauttaa KAIKKI päivän junat,
  // myös väliasemilta lähtevät (esim. SEI→OUL osana HKI→ROI-junaa)
  // live-trains?station= palauttaisi vain ko. asemalta lähtevät junat
  const url = `https://rata.digitraffic.fi/api/v1/trains/${date}`;
  const r = await fetch(url, {headers:{"Digitraffic-User":"Reittiennuste/1.0 Demo","Accept":"application/json"}});
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const trains = await r.json();
  if (!Array.isArray(trains)) throw new Error("Odottamaton vastaus");

  const EXCLUDED_TYPES = new Set(['PAI','PYO','HL','MV','T','V','VET','SHK']);
  const filtered = trains.filter(t => {
    if(t.trainCategory === "Cargo") return false;
    if(EXCLUDED_TYPES.has(t.trainType)) return false;
    if(t.trainNumber >= 110000 && t.trainNumber <= 119999) return false;
    const rows = t.timeTableRows || [];
    // Juna pysähtyy lähtöasemalla (DEPARTURE tai ARRIVAL) JA kohteessa (ARRIVAL)
    // trainStopping !== false varmistaa että kyseessä on kaupallinen pysähdys
    const depRow = rows.find(s =>
      s.stationShortCode === dep &&
      s.trainStopping !== false &&
      s.commercialStop !== false
    );
    const arrRow = rows.find(s =>
      s.stationShortCode === arr &&
      s.type === "ARRIVAL" &&
      s.trainStopping !== false &&
      s.commercialStop !== false
    );
    if(!depRow || !arrRow) return false;
    // Varmistetaan suunta: lähtöasema ennen kohde-asemaa aikataulujärjestyksessä
    return rows.indexOf(depRow) < rows.indexOf(arrRow);
  });

  if (filtered.length === 0) throw new Error(`Ei yhteyksiä ${dep}→${arr} ${date}`);

  return filtered.slice(0, 8).map(t => {
    const rows = t.timeTableRows || [];
    const depR = rows.find(s => s.stationShortCode === dep && s.type === "DEPARTURE");
    const arrR = rows.find(s => s.stationShortCode === arr && s.type === "ARRIVAL");
    const fmt  = iso => iso ? new Date(iso).toLocaleTimeString("fi-FI",{hour:"2-digit",minute:"2-digit"}) : "—";
    return {
      num:   `${t.trainType} ${t.trainNumber}`,
      type:  t.trainType,
      stock: t.trainType,
      dep:   fmt(depR?.scheduledTime),
      arr:   fmt(arrR?.scheduledTime),
      delay: depR?.differenceInMinutes ?? null,
      stops: rows.filter(r => r.type === "ARRIVAL" && r.commercialStop).length,
      live:  true,
    };
  });
}

async function apiTrainHistory(numStr){
  // Parsitaan pelkkä numero: "IC 63" -> "63"
  const trainNumber = numStr.trim().split(' ').pop();
  const res = [];
  const today = new Date();
  for(let i = 1; i <= 7; i++){
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const ds = d.toISOString().split('T')[0];
    try{
      const url = `https://rata.digitraffic.fi/api/v1/trains/${ds}/${trainNumber}`;
      const r = await fetch(url, {headers:{"Digitraffic-User":"Reittiennuste/1.0 Demo","Accept":"application/json"}});
      if(!r.ok) continue;
      const text = await r.text();
      if(!text || text === 'null') continue;
      const data = JSON.parse(text);
      // API palauttaa arrayn tai yksittäisen objektin
      const trains = Array.isArray(data) ? data : [data];
      const train = trains[0];
      if(!train || !train.timeTableRows) continue;
      const rows = train.timeTableRows;
      // Haetaan viimeisin ARRIVAL-rivi jossa on toteuma
      // Haetaan viimeisin rivi jolla on toteuma (ARRIVAL tai DEPARTURE)
      // Otetaan kaikki rivit joilla on actualTime, järjestetään, otetaan viimeisin
      const liveRows = rows.filter(r => r.actualTime && r.differenceInMinutes != null);
      const lastLiveRow = liveRows.length > 0 ? liveRows[liveRows.length - 1] : null;
      const delay = lastLiveRow ? lastLiveRow.differenceInMinutes : null;
      res.push({
        date: ds,
        weekday: d.toLocaleDateString('fi-FI', {weekday:'short'}),
        delay,
        cancelled: train.cancelled || false,
      });
    }catch(e){}
  }
  return res.reverse();
}

async function apiWeather(lat,lon){
  const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,precipitation,weathercode,windspeed_10m,snowfall&wind_speed_unit=ms`);
  if(!r.ok) throw new Error(`Sää HTTP ${r.status}`);
  return (await r.json()).current;
}
async function apiTrackworks(){
  const r=await fetch("https://rata.digitraffic.fi/api/v1/trackwork-notifications/active.json",{headers:{"Digitraffic-User":"Reittiennuste/1.0 Demo"}});
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  // API voi palauttaa arrayn tai objektin {notifications:[...]}
  const text = await r.text();
  let data;
  try { data = JSON.parse(text); } catch(e) { return []; }
  if(Array.isArray(data)) return data.slice(0,4);
  // Kokeillaan yleisimmät kentät
  const candidates = ['notifications','trackworkNotifications','data','items','results'];
  for(const key of candidates){
    if(Array.isArray(data[key])) return data[key].slice(0,4);
  }
  // Ei tunnistettu rakenne – palautetaan tyhjä eikä heitetä virhettä
  return [];
}

// ─── Laskenta ─────────────────────────────────────────────────────────────────
function wcFi(c){if(c===0)return{l:"Selkeää",i:"☀️",s:0};if(c<=3)return{l:"Puolipilvistä",i:"⛅",s:0};if(c<=48)return{l:"Sumua",i:"🌫️",s:1};if(c<=57)return{l:"Tihkusadetta",i:"🌦️",s:1};if(c<=67)return{l:"Sadetta",i:"🌧️",s:1};if(c<=77)return{l:"Lumisadetta",i:"❄️",s:2};if(c<=82)return{l:"Raekuuroja",i:"🌨️",s:2};if(c<=86)return{l:"Runsas lumisade",i:"🌨️",s:3};return{l:"Ukkosmyrsky",i:"⛈️",s:3};}
function wScore(w){if(!w)return 0;let s=wcFi(w.weathercode||0).s*2;if(w.temperature_2m<-15)s+=4;else if(w.temperature_2m<-10)s+=3;else if(w.temperature_2m<-5)s+=2;else if(w.temperature_2m<0)s+=1;if(w.windspeed_10m>18)s+=2;else if(w.windspeed_10m>12)s+=1;if((w.snowfall||0)>1)s+=3;else if((w.snowfall||0)>0.2)s+=1;return s;}
function calcP(season,stock,ws,tw){const b=HIST[season][0]*(SMODS[stock]||1)+ws*2.2+(tw>0?7:0);const pt=Math.min(Math.max(Math.round(b),2),95);const m=6+(ws>3?3:0);return{point:pt,low:Math.max(pt-m,1),high:Math.min(pt+m,99)};}
function pClass(p){const v=typeof p==="object"?p.point:p;return v<25?"safe":v<55?"warn":"danger";}
function barColor(p){return p<15?"var(--safe)":p<25?"var(--warn)":"var(--danger)";}
function buildReasons(season,stock,w,tw){
  const r=[];
  if(season==="Talvi"||season==="Kevät")r.push({l:`Vuodenaika: ${season}`,c:SCOLORS[season]});
  const ws=wScore(w),wc=w?wcFi(w.weathercode||0):null;
  if(ws>=5)r.push({l:`Sää: ${wc?.l}`,c:"var(--danger)"});
  else if(ws>=2)r.push({l:`Sää: ${wc?.l}`,c:"var(--warn)"});
  else if(w)r.push({l:`Sää: ${wc?.l}`,c:"var(--safe)"});
  const mod=SMODS[stock]||1;
  if(mod>1.05)r.push({l:`Kalusto: ${stock} – enemmän pysähdyksiä`,c:"var(--warn)"});
  else if(mod<0.88)r.push({l:`Kalusto: ${stock} – nopea yhteys`,c:"var(--safe)"});
  if(tw>0)r.push({l:`Ratatyöt: ${tw} aktiivista`,c:"var(--warn)"});
  if(r.length===0)r.push({l:"Ei erityisiä riskejä",c:"var(--safe)"});
  return r;
}

// ─── Komponentit ──────────────────────────────────────────────────────────────
function WStrip({w}){
  if(!w)return null;
  const wc=wcFi(w.weathercode||0);const ws=wScore(w);
  const[lbl,cls]=ws>=5?["KORKEA VAIKUTUS","high"]:ws>=2?["KOHTALAINEN","med"]:["MATALA VAIKUTUS","low"];
  return(
    <div className="wstrip">
      <span className="wicon">{wc.i}</span>
      <div className="winfo">
        <div className="wmain">{wc.l} · {Math.round(w.temperature_2m)}°C</div>
        <div className="wdet">Tuuli {Math.round(w.windspeed_10m)} m/s{w.snowfall>0?` · Lumi ${w.snowfall.toFixed(1)} cm/h`:""}{w.precipitation>0.1&&!w.snowfall?` · Sade ${w.precipitation.toFixed(1)} mm`:""}</div>
      </div>
      <span className={`wimp ${cls}`}>{lbl}</span>
    </div>
  );
}

      <div className={`prob-card ${pc}`}>

      <div style={{marginTop:14,paddingTop:12,borderTop:"1px solid var(--border)"}}>
        <div style={{fontSize:10,fontFamily:"var(--mono)",color:"var(--muted)",letterSpacing:"1.2px",textTransform:"uppercase",marginBottom:10}}>{selT.num} – historia 7 vrk <span style={{color:"#3a4250",fontSize:9}}>({selT.num.trim().split(" ").pop()})</span></div>

              const txt=h.cancelled?"Peru":late===null?"—":late<-2?`${late}`:late<=2?"✓":`+${late}`;
              return(<div key={i} style={{background:bg,border:`1px solid ${col}33`,borderRadius:8,padding:"5px 8px",textAlign:"center",minWidth:46}}>

  const maxDate=new Date();maxDate.setDate(maxDate.getDate()+60);
  const maxDateStr=maxDate.toISOString().split("T")[0];

  // Kohdeasemat lähtöaseman perusteella
  const {direct: directDests, withTransfer} = useMemo(()=>getDestinations(dep),[dep]);
  const allDests = useMemo(()=>{
    const codes = new Set([...directDests]);
    withTransfer.forEach(x=>codes.add(x.dest));
    return STATIONS.filter(s=>codes.has(s.code)).sort((a,b)=>a.name.localeCompare(b.name,'fi'));
  },[directDests, withTransfer]);

  // Onko valittu kohde vaihtoyhteydellä?
  const transferInfo = useMemo(()=>withTransfer.find(x=>x.dest===arr),[withTransfer,arr]);
  const isDirect = directDests.includes(arr);

  // Vaihda kohde kun lähtöasema muuttuu
  const handleDepChange = (newDep) => {
    setDep(newDep);
    setTrains(null);setConnTrains(null);setSel(null);setViaStation(null);setDebugLog([]);
    const {direct, withTransfer} = getDestinations(newDep);
    const all = [...direct, ...withTransfer.map(x=>x.dest)];
    if (!all.includes(arr)) {
      const sorted = STATIONS.filter(s=>all.includes(s.code)).sort((a,b)=>a.name.localeCompare(b.name,'fi'));
      if (sorted.length>0) setArr(sorted[0].code);
    }
  };

    setTrainHistory(null);
    setHistoryLoading(true);

      const hist = await apiTrainHistory(num);
      setTrainHistory(hist);

      setTrainHistory([]);
    }
    setHistoryLoading(false);
  }, []);

  const analyze = useCallback(async()=>{
    if(dep===arr)return;
    setLoading(true);setTrains(null);setConnTrains(null);setSel(null);setViaStation(null);setDebugLog([]);setTrainHistory(null);
    const log=[];

    // 1. Junavuorot pääreitti

    let tdata,tsrc;

    const actualArr = isDirect ? arr : (transferInfo?.via || arr);

      tdata=await apiTrains(actualDep, actualArr, date);

    }catch(e){
      tdata=getFB(actualDep, actualArr);tsrc="demo";
      log.push(`⚠ ${isDirect?"Suorat":"1. osuus"}: ${e.message} → demo-data`);
    }

    catch(e){log.push(`⚠ Ratatyöt: ${e.message}`);}
    setTw(twdata);
    setDebugLog(log);setLoading(false);setStep("");
  },[dep,arr,date,depSt,isDirect,transferInfo]);

  const dateLabel=date===todayStr()?"tänään":new Date(date).toLocaleDateString("fi-FI",{weekday:"short",day:"numeric",month:"numeric"});

  const selTrain  = sel?.type==="direct" && trains    ? trains[sel.idx]    : null;
  const selConn   = sel?.type==="conn"   && connTrains? connTrains[sel.idx] : null;

  return(
    <div className="app">
      <div className="header">
        <div className="rail-icon">🚆</div>
        <div className="header-text">
          <h1>Reittiennuste</h1>
          <p>Myöhästymistodennäköisyys · Digitraffic + Säädata + Kalustodata · Suomen rataverkko</p>
        </div>
        <a href="reittiennuste_kartta.html" style={{marginLeft:"auto",background:"var(--bg3)",border:"1px solid var(--border)",color:"var(--muted)",fontFamily:"var(--mono)",fontSize:12,padding:"7px 14px",borderRadius:8,textDecoration:"none",whiteSpace:"nowrap",flexShrink:0,transition:"all .15s"}}
          onMouseOver={e=>{e.target.style.borderColor="var(--rail)";e.target.style.color="var(--text)"}}
          onMouseOut={e=>{e.target.style.borderColor="var(--border)";e.target.style.color="var(--muted)"}}>
          Kartta →
        </a>
      </div>
      <div className="track-line"/>

      <div className="search-section">
        <div className="search-label">Valitse reitti ja päivämäärä</div>
        <div className="search-row">
          <div className="select-wrap">
            <select value={dep} onChange={e=>handleDepChange(e.target.value)}>
              {STATIONS.map(s=><option key={s.code} value={s.code}>{s.name}</option>)}
            </select>
          </div>
          <span className="arrow-mid">→</span>
          <div className="select-wrap">
            <select value={arr} onChange={e=>{setArr(e.target.value);setTrains(null);setConnTrains(null);setSel(null);}}>
              {allDests.length>0
                ? allDests.map(s=><option key={s.code} value={s.code}>{s.name}{!directDests.includes(s.code)?" (vaihto)":""}</option>)
                : STATIONS.filter(s=>s.code!==dep).map(s=><option key={s.code} value={s.code}>{s.name}</option>)
              }
            </select>
          </div>
          <input type="date" className="date-input" value={date} min="2024-01-01" max={maxDateStr}
            onChange={e=>{setDate(e.target.value);setTrains(null);setConnTrains(null);setSel(null);}}/>
          <button className="btn" onClick={analyze} disabled={loading||dep===arr}>
            {loading?"Haetaan...":"Hae vuorot"}
          </button>
        </div>
        {transferInfo&&<div style={{marginTop:10,fontSize:12,fontFamily:"var(--mono)",color:"var(--muted)"}}>
          ↻ Vaihtoyhteydellä: {depSt?.name} → {STATIONS.find(s=>s.code===transferInfo.via)?.name} → {arrSt?.name}
        </div>}
      </div>

      {loading&&<div className="loading"><div className="spinner"/><span>{step}</span></div>}

      {debugLog.length>0&&(
        <div className="debug-box">
          {debugLog.map((l,i)=><div key={i} className={l.startsWith("⚠")?"derr":""}>{l}</div>)}
        </div>
      )}

      {/* 1. osuus / suorat junat */}
      {trains&&(
        <div className="card">
          <div className="sec-title">
            {isDirect?"Junavuorot":"1. osuus: " + depSt?.name + " → " + (viaSt?.name||STATIONS.find(s=>s.code===transferInfo?.via)?.name)} {dateLabel}
            <span className={`dbadge ${trainSrc==="live"?"live":"demo"}`}>{trainSrc==="live"?"● LIVE":"● Demo"}</span>
          </div>
          <div className="train-list">
            {trains.map((t,i)=>(
              <div key={i} className={`train-row${sel?.type==="direct"&&sel.idx===i?" sel":""}`}
                   onClick={()=>{setSel({type:"direct",idx:i});fetchHistory(t.num);}}>
                <span className="t-num">{t.num}</span>
                <span className="t-badge">{t.type}</span>
                <span className="t-times">{t.dep} → {t.arr}</span>
                <span className="t-stops">{t.stops} pys.</span>
                {t.live&&t.delay!=null
                  ?<span className={`t-delay ${t.delay>2?"late":"ok"}`}>{t.delay>0?`+${t.delay} min`:"Ajallaan"}</span>
                  :<span className="t-delay unk">—</span>}
              </div>
            ))}
          </div>
          {!sel&&<div className="hint">↑ Valitse junavuoro nähdäksesi myöhästymisennusteen</div>}
        </div>
      )}

      {/* 2. osuus vaihtoyhteydelle */}
      {connTrains&&(
        <div className="card">
          <div className="sec-title">
            Jatkoyhteys: {viaSt?.name} → {arrSt?.name} {dateLabel}
            <span className="dbadge demo" style={{fontSize:10}}>Valitse alta</span>
          </div>
          <div className="train-list">
            {connTrains.map((t,i)=>(
              <div key={i} className={`train-row${sel?.type==="conn"&&sel.idx===i?" sel":""}`}
                   onClick={()=>{setSel({type:"conn",idx:i});fetchHistory(t.num);}}>
                <span className="t-num">{t.num}</span>
                <span className="t-badge">{t.type}</span>
                <span className="t-times">{t.dep} → {t.arr}</span>
                <span className="t-stops">{t.stops} pys.</span>
                {t.live&&t.delay!=null
                  ?<span className={`t-delay ${t.delay>2?"late":"ok"}`}>{t.delay>0?`+${t.delay} min`:"Ajallaan"}</span>
                  :<span className="t-delay unk">—</span>}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Ennustekortit */}
      {selTrain&&(
        <ProbCard selT={selTrain} depSt={depSt} arrSt={isDirect?arrSt:viaSt}
          date={date} weather={weather} tw={tw} wSrc={wSrc}
          label={isDirect?"Myöhästymisriski":"1. osuus – myöhästymisriski"}
          trainHistory={trainHistory} historyLoading={historyLoading}/>
      )}
      {selConn&&(
        <ProbCard selT={selConn} depSt={viaSt} arrSt={arrSt}
          date={date} weather={weather} tw={tw} wSrc={wSrc}
          label="Jatkoyhteys – myöhästymisriski"
          trainHistory={trainHistory} historyLoading={historyLoading}/>
      )}

      {(selTrain||selConn)&&(
        <>
          <WStrip w={weather}/>
          {tw.length>0&&(
            <div style={{marginBottom:16}}>
              <div className="sec-title">Aktiiviset ratatyöt</div>
              {tw.map((t,i)=><div key={i} className="tw-item"><div className="tw-title">{t.location||t.id||`Ratatyö ${i+1}`}</div><div className="tw-det">{t.state||""}</div></div>)}
            </div>
          )}
          <HistSection dateStr={date} stock={(selTrain||selConn).stock}/>
        </>
      )}

      <div className="footer">
        <span>Data: rata.digitraffic.fi (CC BY 4.0) · Open-Meteo · Fintraffic täsmällisyystilastot 2022–2024</span>
        <span>Next Route Media Oy · 2026</span>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
